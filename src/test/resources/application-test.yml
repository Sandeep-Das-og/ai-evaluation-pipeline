spring:
  datasource:
    url: jdbc:h2:mem:aieval;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  cache:
    type: simple

app:
  ingestion:
    realtime-enabled: false
  eval:
    llm-judge:
      mode: stub
    latency-threshold-ms: 1000
